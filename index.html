<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종목별 비중</title>
<style>
  :root{
    --bg:#ffffff; --ink:#1a1a1a; --sub:#6b7280; --line:#eceff3;
    --font:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);padding:20px 16px;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:520px;margin:0 auto;}
  h1{font-size:18px;font-weight:800;letter-spacing:-.02em;}
  .total{font-size:13px;color:var(--sub);margin-top:4px;}
  .total b{color:var(--ink);font-weight:700;}
  .chartbox{position:relative;width:260px;height:260px;margin:18px auto 6px;}
  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
  .center .lbl{font-size:11px;color:var(--sub);}
  .center .val{font-size:19px;font-weight:800;letter-spacing:-.02em;margin-top:2px;}
  svg{width:100%;height:100%;transform:rotate(-90deg);}
  .seg{transition:opacity .15s;cursor:pointer;}
  .seg.dim{opacity:.28;}
  .legend{margin-top:14px;border-top:1px solid var(--line);}
  .row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);font-size:13px;cursor:pointer;}
  .row:hover{background:#fafbfc;}
  .dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto;}
  .nm{flex:1;font-weight:600;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pct{font-weight:800;font-variant-numeric:tabular-nums;}
  .amt{color:var(--sub);font-size:11px;font-variant-numeric:tabular-nums;min-width:78px;text-align:right;}
  .note{font-size:11px;color:var(--sub);margin-top:14px;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <h1>전체 계좌 종목별 비중</h1>
  <div class="total">23개 종목 · 비중(%) 기준 (동일 종목 합산)</div>

  <div class="chartbox">
    <svg viewBox="0 0 100 100" id="donut"></svg>
    <div class="center">
      <div class="lbl" id="cl">전체</div>
      <div class="val" id="cv">100%</div>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="note">상위 종목 S&amp;P500·나스닥·QQQ 계열이 약 75%를 차지하는 미국 대형주 집중형 구성입니다. 채권·금·원유 등 분산 자산은 약 7% 수준입니다.</div>
</div>

<script>
const data = [
  ["KODEX 미국S&P500",37386545,23.68],
  ["뱅가드 S&P500 (VOO)",35465807,22.47],
  ["INVESCO QQQ (QQQ)",32066337,20.31],
  ["KODEX 미국나스닥100",13558710,8.59],
  ["KODEX MSCI선진국",11209050,7.10],
  ["뱅가드 세계주식 (VT)",4997195,3.17],
  ["KODEX 미국30년국채",2858625,1.81],
  ["TIGER 미국채10년선물",2751960,1.74],
  ["TIGER 골드선물(H)",2381640,1.51],
  ["SPDR S&P500 (SPY)",2268966,1.44],
  ["KODEX TRF3070",2095920,1.33],
  ["TIGER 미국S&P500선물",1837920,1.16],
  ["KODEX WTI원유선물",1494300,0.95],
  ["KODEX 200미국채혼합",1491525,0.94],
  ["TIGER 반도체TOP10",1120020,0.71],
  ["KODEX 미국AI테크TOP",843500,0.53],
  ["TIGER 미국우주테크",838575,0.53],
  ["TIGER 미국필라델피아반도체",761025,0.48],
  ["TIGER 미국다우존스30",737600,0.47],
  ["KODEX 미국반도체",618450,0.39],
  ["SOL 코리아밸류업TR",589500,0.37],
  ["INVESCO 나스닥100 (QQQM)",455265,0.29],
  ["카카오",40500,0.03],
];
const total=157868935;
const colors=["#2563eb","#3b82f6","#60a5fa","#0ea5e9","#06b6d4","#14b8a6","#f59e0b","#f97316","#eab308","#93c5fd","#a78bfa","#8b5cf6","#ef4444","#fbbf24","#10b981","#6366f1","#ec4899","#f43f5e","#84cc16","#22c55e","#d946ef","#bae6fd","#9ca3af"];

const svg=document.getElementById('donut');
const R=42, C=2*Math.PI*R, SW=16;
let off=0;
data.forEach((d,i)=>{
  const frac=d[1]/total, len=frac*C;
  const ci=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ci.setAttribute('cx',50);ci.setAttribute('cy',50);ci.setAttribute('r',R);
  ci.setAttribute('fill','none');ci.setAttribute('stroke',colors[i]);
  ci.setAttribute('stroke-width',SW);
  ci.setAttribute('stroke-dasharray',`${len} ${C-len}`);
  ci.setAttribute('stroke-dashoffset',-off);
  ci.setAttribute('class','seg');ci.dataset.i=i;
  svg.appendChild(ci);
  off+=len;
});

const cl=document.getElementById('cl'),cv=document.getElementById('cv');
const segs=[...document.querySelectorAll('.seg')];
const legend=document.getElementById('legend');
data.forEach((d,i)=>{
  const row=document.createElement('div');row.className='row';row.dataset.i=i;
  row.innerHTML=`<span class="dot" style="background:${colors[i]}"></span>
    <span class="nm">${d[0]}</span>
    <span class="pct">${d[2]}%</span>`;
  legend.appendChild(row);
});

function focus(i){
  segs.forEach(s=>s.classList.toggle('dim',i!==null && +s.dataset.i!==i));
  if(i===null){cl.textContent='전체';cv.textContent='100%';}
  else{cl.textContent=data[i][0];cv.textContent=data[i][2]+'%';}
}
[...segs,...legend.children].forEach(el=>{
  el.addEventListener('mouseenter',()=>focus(+el.dataset.i));
  el.addEventListener('mouseleave',()=>focus(null));
});
</script>
</body>
</html>
